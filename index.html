<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>ぶろっくおとし</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="playfield" aria-label="Tetris game">
        <canvas id="board" width="300" height="600" aria-label="Game board"></canvas>
        <div id="overlay" class="overlay">
          <strong>ぶろっくおとし</strong>
          <button id="startButton" class="primary-action" type="button">ここを おす</button>
          <span class="overlay-hint">はじめる</span>
        </div>
      </section>

      <aside class="panel">
        <div class="stat">
          <span>すこあ</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat">
          <span>けした</span>
          <strong id="lines">0</strong>
        </div>
        <div class="stat">
          <span>れべる</span>
          <strong id="level">1</strong>
        </div>
        <div class="stat">
          <span>さいこう</span>
          <strong id="best">0</strong>
        </div>
        <canvas id="next" width="120" height="120" aria-label="Next piece"></canvas>
        <div id="wasmState" class="badge status-hidden" aria-live="polite">まってね</div>
      </aside>

      <nav class="controls" aria-label="Touch controls">
        <button data-action="left" aria-label="Left">&larr;</button>
        <button data-action="rotate" aria-label="Rotate">&#8635;</button>
        <button data-action="right" aria-label="Right">&rarr;</button>
        <button data-action="down" aria-label="Down">&darr;</button>
        <button data-action="drop" class="wide" aria-label="Hard drop">おとす</button>
      </nav>
    </main>

    <script src="app.js"></script>
  </body>
</html>
